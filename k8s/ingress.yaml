apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediguard-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - app.mediguard.ai
    - api.mediguard.ai
    secretName: mediguard-tls
  rules:
  - host: app.mediguard.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
  - host: api.mediguard.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
