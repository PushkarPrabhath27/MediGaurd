apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediguard-backend
  labels:
    app: mediguard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mediguard-backend
  template:
    metadata:
      labels:
        app: mediguard-backend
    spec:
      containers:
      - name: mediguard-backend
        image: mediguard/backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
        - name: REDIS_ADDR
          value: "redis-service:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: mediguard-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
