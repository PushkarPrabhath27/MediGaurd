services:
  postgres:
    image: postgres:15-alpine
    container_name: mediguard-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-mediguard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mediguard_pass}
      POSTGRES_DB: ${DB_NAME:-mediguard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mediguard} -d ${DB_NAME:-mediguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediguard-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediguard-backend
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-mediguard}
      - DB_PASSWORD=${DB_PASSWORD:-mediguard_pass}
      - DB_NAME=${DB_NAME:-mediguard}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # For hot-reload during dev (assuming 'air' is used in Dockerfile)
    command: air -c .air.toml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediguard-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # For hot-reload during dev
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: mediguard-network
