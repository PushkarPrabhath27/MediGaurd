name: Feature request
description: Suggest an improvement to MediGuard
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user, workflow, or product need should this address?
      placeholder: Clinical engineering teams need clearer prioritization for high-risk equipment.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature, behavior, or workflow you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List workarounds or other approaches if you have them.
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Explain who benefits and how this would improve the product.
